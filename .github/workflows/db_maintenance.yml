name: DB Maintenance

on:
  schedule:
    # 北京时间 23:05（UTC+8）
    - cron: "5 15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode (no actual deletion)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: db-maintenance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run DB maintenance
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="--dry-run"
          fi
          python -u scripts/db_maintenance.py $ARGS
